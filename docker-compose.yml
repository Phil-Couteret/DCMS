# DCMS - VPS-style stack for local testing (Mac/Linux)
# Run: docker compose up -d
# Admin UI: http://localhost:3000  |  API: http://localhost:3003  |  Swagger: http://localhost:3003/api

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dcms
      POSTGRES_USER: dcms
      POSTGRES_PASSWORD: dcms
    volumes:
      - dcms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcms -d dcms"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://dcms:dcms@db:5432/dcms?schema=public
      PORT: 3003
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      # Must be set in a .env file next to this compose file (repo root) -
      # docker compose fails to start if JWT_SECRET is unset. Generate one with:
      #   openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in a .env file at the repo root before running docker compose}
    volumes:
      # Optional demo seed data (backend/docker-entrypoint.sh loads
      # database/seeds/002_sample_data.sql if present, after schema migration).
      - ./database:/init:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3003:3003"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  dcms_pgdata:
